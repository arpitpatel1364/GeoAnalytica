version: "3.9"

# ============================================================
# GeoAnalytica — Docker Compose
# Services: postgres, redis, backend, worker, beat, nginx
# ============================================================

x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  volumes:
    - ./backend:/app
    - playwright_cache:/root/.cache/ms-playwright
  env_file:
    - .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  # ── PostgreSQL with PostGIS ─────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: geoanalytica_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geoanalytica}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-geoanalytica}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: geoanalytica_redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    <<: *backend-common
    container_name: geoanalytica_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level info
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Celery Worker ───────────────────────────────────────────
  worker:
    <<: *backend-common
    container_name: geoanalytica_worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,queries,alerts,exports
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── Celery Beat (Scheduler) ─────────────────────────────────
  beat:
    <<: *backend-common
    container_name: geoanalytica_beat
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    depends_on:
      worker:
        condition: service_started

  # ── Nginx Reverse Proxy + Static Frontend ──────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: geoanalytica_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ── Named Volumes ────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  playwright_cache:
    driver: local

# ── Networks ─────────────────────────────────────────────────
networks:
  default:
    name: geoanalytica_network
    driver: bridge
